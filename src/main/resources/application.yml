# ==================== CONFIGURACIÓN GENERAL ====================
server:
  port: 8085

spring:
  profiles:
    active: dev   # Cambia a 'qa', 'prod' o 'test' según el entorno

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    distribution:
      percentiles-histogram:
        http.server:
          requests: true

# Configuración JWT (común a todos los perfiles)
jwt:
  secret: ${JWT_SECRET:2da08e8ee264a149413ce46abebbd566b4c8bbb019b37708ed9d77f8511ac7bf}
  expiration: 86400000

# Patrón de log global (se puede sobrescribir en perfiles)
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} - %logger{36} - [%X{correlationId}] - %msg%n"

# ==================== PERFIL: dev (desarrollo local) ====================
---
spring:
  config:
    activate:
      on-profile: dev
  application:
    name: movies
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/movies_dev
    username: root
    password: 1234
  jpa:
    database: MYSQL
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    root: WARN
    com.estebanmmk13.movies: DEBUG
    org.hibernate: ERROR
    org.springframework: ERROR
    org.springframework.web: INFO
# NOTA: El patrón de log ya se hereda del bloque global, no hace falta repetirlo.

# ==================== PERFIL: qa (entorno de pruebas) ====================
---
spring:
  config:
    activate:
      on-profile: qa
  application:
    name: movies
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/movies_qa
    username: root
    password: 1234
  jpa:
    database: MYSQL
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    root: WARN
    com.estebanmmk13.movies: INFO
    org.hibernate: WARN
    org.springframework: WARN

# ==================== PERFIL: prod (producción) ====================
---
spring:
  config:
    activate:
      on-profile: prod
  application:
    name: movies
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/movies_prod
    username: root
    password: ${DB_PASSWORD:1234}
  jpa:
    database: MYSQL
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

logging:
  level:
    root: ERROR
    com.estebanmmk13.movies: WARN
    org.hibernate: ERROR
    org.springframework: ERROR

# ==================== PERFIL: test (pruebas automáticas) ====================
---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: INFO
    com.estebanmmk13.movies: DEBUG
    org.hibernate: INFO